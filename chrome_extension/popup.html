<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <style>
        /* Жестко задаем размер окна */
        body {
            width: 450px;
            margin: 0;
            padding: 15px;
            background-color: #0f172a;
            /* slate-900 */
            color: #f1f5f9;
            font-family: sans-serif;
        }

        .container {
            background-color: #1e293b;
            /* slate-800 */
            border: 1px solid rgba(6, 182, 212, 0.3);
            /* cyan-500/30 */
            border-radius: 12px;
            padding: 20px;
        }

        h1 {
            color: #22d3ee;
            font-size: 1.2rem;
            margin-top: 0;
        }

        /* Стилизуем div под textarea */
        .editor-box {
            width: 100%;
            min-height: 120px;
            max-height: 250px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            outline: none;
        }

        .editor-box:focus {
            border-color: #22d3ee;
        }

        #resultText {
            border-color: rgba(16, 185, 129, 0.5);
            /* emerald-500/50 */
            color: #34d399;
        }

        /* Эмуляция плейсхолдера для div */
        .editor-box:empty::before {
            content: attr(placeholder);
            color: #64748b;
            pointer-events: none;
        }

        button {
            background-color: #059669;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            float: right;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚡ Sanitizer | MADNIKE</h1>
        <label style="font-size: 12px; color: #94a3b8;">Вставь текст:</label>
        <div id="rawText" class="editor-box" contenteditable="true" placeholder="Вставь текст от ИИ..."></div>

        <label style="font-size: 12px; color: #94a3b8;">Результат:</label>
        <div id="resultText" class="editor-box" placeholder="Чистый текст появится тут..."></div>

        <button id="copyBtn" class="hidden">КОПИРОВАТЬ</button>
        <div style="clear: both;"></div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
